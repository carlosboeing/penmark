name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  checks:
    name: Lint / Typecheck / Unit
    runs-on: ubuntu-latest
    # T12: 1.5× headroom on every perf budget in CI (slower/noisier than local).
    # Consumed by the layer-1 render bench run via npm run test:unit (design §8).
    env:
      PERF_MULTIPLIER: "1.5"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:unit

      - name: Generate coverage summary
        if: always()
        run: |
          mkdir -p coverage
          if [ -f coverage/coverage-summary.json ]; then
            node scripts/coverage-report.mjs coverage/coverage-summary.json > coverage/coverage-report.md
          else
            cat > coverage/coverage-report.md <<'EOF'
          <!-- penmark-coverage-report -->
          ### Coverage

          Coverage summary was not generated. Check the unit-test logs and the `coverage-report` artifact.
          EOF
          fi
          cat coverage/coverage-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      # NOTE: on a public repo, PRs from forks run with a read-only GITHUB_TOKEN,
      # so this step only comments on same-repository PRs. External fork PRs still
      # get the job summary and uploaded coverage artifact above.
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY_FILE="coverage/coverage-report.md"
          COMMENTS_API="/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments"
          COMMENT_ID=$(gh api "$COMMENTS_API" \
            --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- penmark-coverage-report -->"))) | .id' \
            | tail -n 1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "/repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
              -X PATCH \
              -f body="$(cat "$BODY_FILE")"
          else
            gh pr comment "${{ github.event.pull_request.number }}" --body-file "$BODY_FILE"
          fi

  browser-tests:
    name: Browser tests (visual goldens)
    runs-on: ubuntu-latest
    # Pin the rendering environment to the same image used to generate the
    # screenshot goldens (T6). This guarantees pixel-identical Chromium + fonts
    # between local golden generation and CI — see test/browser/theme.spec.ts.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    # T12: 1.5× headroom on every perf budget in CI. Consumed by the layer-3
    # perf spec run via npm run test:browser (design §8).
    env:
      PERF_MULTIPLIER: "1.5"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Browsers are pre-installed in the Playwright image (PLAYWRIGHT_BROWSERS_PATH).
      - name: Browser tests
        run: npm run build && npm run test:browser

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  extension-tests:
    name: Extension tests (${{ matrix.os }} / vscode ${{ matrix.vscode }})
    # Run on PRs and pushes to main (same trigger as the outer workflow)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Pinned, not "stable": a floating "stable" is a moving target that can
        # turn CI red on a VS Code release with no code change. Lower bound is the
        # compatibility floor (engines.vscode ^1.105.0); upper bound is a pinned
        # recent release. Bump the upper version deliberately (and update the
        # matching required-check name in the main ruleset) when validating a newer
        # VS Code, rather than letting it drift.
        vscode: ["1.105.0", "1.124.2"]

    runs-on: ${{ matrix.os }}
    # T12: 1.5× headroom on every perf budget in CI. Consumed by the layer-4
    # activation test run inside VS Code via npm run test:ext (design §8). Set at
    # job level so it propagates into the test-electron child process.
    env:
      PERF_MULTIPLIER: "1.5"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Run extension tests (Linux — xvfb required)
        if: runner.os == 'Linux'
        env:
          VSCODE_VERSION: ${{ matrix.vscode }}
        run: xvfb-run -a npm run test:ext

      - name: Run extension tests (macOS / Windows)
        if: runner.os != 'Linux'
        env:
          VSCODE_VERSION: ${{ matrix.vscode }}
        run: npm run test:ext

  package:
    name: Package + size gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production + package VSIX
        run: npm run package

      - name: VSIX size gate
        run: node scripts/check-vsix-size.mjs penmark-*.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: penmark-vsix
          path: penmark-*.vsix
          retention-days: 14
