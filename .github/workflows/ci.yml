name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  checks:
    name: Lint / Typecheck / Unit
    runs-on: ubuntu-latest
    # T12: CI headroom on perf budgets (slower/noisier than local). 1.75× after
    # ubuntu-latest medians occasionally exceeded 1.5× on loaded runners (2026-06).
    env:
      PERF_MULTIPLIER: "1.75"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:unit

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      # NOTE: on a public repo, PRs from forks run with a read-only GITHUB_TOKEN,
      # so this step (which needs pull-requests: write) fails for EXTERNAL fork
      # PRs. PRs from branches in this repo are unaffected. This is expected and
      # not a code failure; the coverage artifact above is always uploaded.
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # lcov-report emits integer percentages ("100%") — pattern must not require a decimal point.
          SUMMARY=$(cat coverage/lcov-report/index.html 2>/dev/null \
            | grep -oE '[0-9]+(\.[0-9]+)?%' | head -4 \
            | paste -sd ' / ' -)
          [ -n "$SUMMARY" ] || SUMMARY="see artifact"
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "**Coverage** (stmts / branch / funcs / lines): ${SUMMARY}" \
            --edit-last \
            || gh pr comment "${{ github.event.pull_request.number }}" \
            --body "**Coverage** (stmts / branch / funcs / lines): ${SUMMARY}"

  browser-tests:
    name: Browser tests (visual goldens)
    runs-on: ubuntu-latest
    # Pin the rendering environment to the same image used to generate the
    # screenshot goldens (T6). This guarantees pixel-identical Chromium + fonts
    # between local golden generation and CI — see test/browser/theme.spec.ts.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    # T12: 1.5× headroom on every perf budget in CI. Consumed by the layer-3
    # perf spec run via npm run test:browser (design §8).
    env:
      PERF_MULTIPLIER: "1.75"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Browsers are pre-installed in the Playwright image (PLAYWRIGHT_BROWSERS_PATH).
      - name: Browser tests
        run: npm run build && npm run test:browser

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  extension-tests:
    name: Extension tests (${{ matrix.os }} / vscode ${{ matrix.vscode }})
    # Run on PRs and pushes to main (same trigger as the outer workflow)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Pinned, not "stable": a floating "stable" is a moving target that can
        # turn CI red on a VS Code release with no code change. Lower bound is the
        # compatibility floor (engines.vscode ^1.105.0); upper bound is a pinned
        # recent release. Bump the upper version deliberately (and update the
        # matching required-check name in the main ruleset) when validating a newer
        # VS Code, rather than letting it drift.
        vscode: ["1.105.0", "1.124.2"]

    runs-on: ${{ matrix.os }}
    # T12: 1.5× headroom on every perf budget in CI. Consumed by the layer-4
    # activation test run inside VS Code via npm run test:ext (design §8). Set at
    # job level so it propagates into the test-electron child process.
    env:
      PERF_MULTIPLIER: "1.75"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Run extension tests (Linux — xvfb required)
        if: runner.os == 'Linux'
        env:
          VSCODE_VERSION: ${{ matrix.vscode }}
        run: xvfb-run -a npm run test:ext

      - name: Run extension tests (macOS / Windows)
        if: runner.os != 'Linux'
        env:
          VSCODE_VERSION: ${{ matrix.vscode }}
        run: npm run test:ext

  package:
    name: Package + size gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production + package VSIX
        run: npm run package

      - name: VSIX size gate
        run: node scripts/check-vsix-size.mjs penmark-*.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: penmark-vsix
          path: penmark-*.vsix
          retention-days: 14
